<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet JS - Gestionnaire de Tâches</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1><i class="fas fa-list-check"></i> MyManager JS</h1>
            <p>Gestion de données interactive</p>
        </header>

        <section class="input-section">
            <form id="todo-form">
                <input type="text" id="task-input" placeholder="Ajouter une nouvelle tâche..." required>
                <button type="submit" class="add-btn">
                    <i class="fas fa-plus"></i>
                </button>
            </form>
        </section>

        <section class="list-section">
            <div class="filters">
                <span id="task-count">0 tâche(s)</span>
            </div>
            <ul id="task-list"></ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
